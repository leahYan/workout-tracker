<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#E8E9EF">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Workout</title>
<link rel="icon" href="icon-192.png">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
body{margin:0;background:#DDDEE6;font-family:system-ui,-apple-system,'Segoe UI',sans-serif;color:#16171C;-webkit-tap-highlight-color:transparent}
.app{max-width:420px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:24px 16px 20px;box-sizing:border-box;background:#E8E9EF}
.card{background:#fff;border-radius:22px;padding:18px;box-sizing:border-box}
.title{font-weight:800;font-size:17px;letter-spacing:-.01em}
.h1{font-weight:800;font-size:26px;letter-spacing:-.01em}
.sub{font-weight:400;font-size:13px;color:#9A9CA6}
.big{font-weight:800;font-size:30px;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.big small{font-weight:400;font-size:15px;color:#B3B5BF;letter-spacing:0}
.ghost{color:#C6C8D2}
.ghost small{color:#D8DAE2}
.pill{border-radius:999px;background:#16171C;color:#fff;font-weight:800;font-size:14px;padding:17px 22px;text-align:center;cursor:pointer;user-select:none}
.pill:active{transform:scale(.985)}
.gpill{border-radius:999px;background:#fff;color:#16171C;font-weight:800;font-size:13px;padding:13px 20px;text-align:center;cursor:pointer;user-select:none;flex:1}
.chip{border-radius:999px;background:#EEE9FB;color:#6F58B8;font-weight:800;font-size:12px;padding:8px 14px;white-space:nowrap}
.step{width:52px;height:52px;border-radius:999px;background:#F2F2F6;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;cursor:pointer;user-select:none;flex-shrink:0}
.step:active{background:#E4E4EC}
.stepsm{width:38px;height:38px;font-size:16px}
.rm{width:28px;height:28px;border-radius:999px;background:#F2F2F6;color:#9A9CA6;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;cursor:pointer;user-select:none;flex-shrink:0}
.rm:active{background:#E4E4EC}
.row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #F0F0F4}
.row:last-child{border-bottom:0}
.sethead{font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#C0C2CC;padding-bottom:6px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.tab{font-weight:800;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#C0C2CC;cursor:pointer;padding:6px 10px}
.tabon{color:#16171C}
.tabbar{display:flex;justify-content:space-around;padding-top:16px}
.ring{transform:rotate(-90deg)}
.ringwrap{position:relative;width:72px;height:72px;margin:0 auto}
.ringnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;font-variant-numeric:tabular-nums}
.fx{display:flex;align-items:center}
.jb{justify-content:space-between}
.col{display:flex;flex-direction:column}
.g10{gap:10px}.g12{gap:12px}
.mt12{margin-top:12px}.mtauto{margin-top:auto;padding-top:16px}
.hpad{padding:4px 6px 18px}
.tc{text-align:center}
.violet{color:#6F58B8}
.linkbtn{font-weight:800;font-size:13px;color:#6F58B8;cursor:pointer;user-select:none}
.grey{color:#9A9CA6}
.danger{color:#D9534F}
.setno{font-weight:800;font-size:12px;color:#6F58B8}
.seg{display:flex;background:#DFE0E8;border-radius:999px;padding:4px;gap:4px}
.segbtn{flex:1;text-align:center;font-weight:800;font-size:12px;padding:9px 0;border-radius:999px;color:#9A9CA6;cursor:pointer;user-select:none}
.segon{background:#fff;color:#16171C}
.stepseg{display:flex;justify-content:center;gap:6px;margin-top:14px}
.txt{width:100%;box-sizing:border-box;border:0;background:#F2F2F6;border-radius:14px;padding:14px 16px;font-size:16px;font-weight:800;font-family:inherit;color:#16171C;outline:none}
.kgin{border:0;background:transparent;font-family:inherit;font-weight:800;font-size:44px;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:#16171C;width:130px;text-align:center;outline:none;padding:0;border-radius:10px}
.kgin:focus{background:#F2F2F6}
.kgin::-webkit-outer-spin-button,.kgin::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.gtog{border-radius:999px;font-weight:800;font-size:13px;padding:10px 16px;cursor:pointer;user-select:none;background:#F2F2F6;color:#9A9CA6}
.gtog.on{background:#EEE9FB;color:#6F58B8}
.stepopt{font-weight:800;font-size:11px;color:#C0C2CC;padding:6px 10px;border-radius:999px;cursor:pointer;user-select:none}
.stepopt.on{background:#F2F2F6;color:#16171C}
.scroll{overflow-y:auto;flex:1;min-height:0}
</style>
</head>
<body>
<div id="app" class="app"></div>
<input type="file" id="importFile" accept=".json,application/json" hidden>
<script>
'use strict';

const SEED_EX = [
  { name: 'Hip Thrust', groups: ['Glutes'] },
  { name: 'Romanian Deadlift', groups: ['Glutes', 'Back'] },
  { name: 'Lat Pulldown', groups: ['Back'] },
  { name: 'Seated Row', groups: ['Back'] },
  { name: 'Shoulder Press', groups: ['Shoulders'] },
  { name: 'Lateral Raise', groups: ['Shoulders'] }
];
const GROUPS = ['Glutes', 'Back', 'Shoulders'];
const GCOLORS = { Glutes: '#B9A5F2', Back: '#A9C46C', Shoulders: '#F2B9C6' };

function load(k, fb) { try { const v = JSON.parse(localStorage.getItem(k)); return v == null ? fb : v; } catch (e) { return fb; } }
function normEx(list) {
  return list
    .filter(e => e && typeof e.name === 'string' && Array.isArray(e.groups))
    .map(e => { const gs = GROUPS.filter(g => e.groups.includes(g)); return { name: e.name, groups: gs.length ? gs : [GROUPS[0]], group: (gs.length ? gs : [GROUPS[0]]).join(' · ') }; });
}

function withIds(list) {
  (list || []).forEach(s => {
    if (!s.id) s.id = 'legacy-' + s.date + '-' + (s.sets ? s.sets.length : 0);
    if (!s.mt) s.mt = s.date;
  });
  return list || [];
}

let sessions = withIds(load('wt.sessions', []));
let EX = normEx(load('wt.exercises', SEED_EX));
if (!EX.length) EX = normEx(SEED_EX);
let exTs = load('wt.exts', 0);
let tombs = load('wt.tombs', []);
let sync = load('wt.sync', null) || {};
sync = { url: sync.url || '', key: sync.key || '', last: sync.last || 0 };
let draft = load('wt.today', null) || {};
draft = { sets: draft.sets || [], exIdx: draft.exIdx || 0, kg: draft.kg ?? null, reps: draft.reps ?? null, startedAt: draft.startedAt || null, restUntil: draft.restUntil || null };
if (draft.exIdx >= EX.length) draft.exIdx = 0;
let weightStep = load('wt.step', 2.5);
let restSec = load('wt.rest', 90); // 0 = timer off
let ui = { view: 'home', period: 'week', groupSel: 'Glutes', logIdx: null, editing: null, showKey: false, syncBusy: false, progMetric: 'vol', progSel: null, pickGroup: 'Glutes' };

function persist() {
  localStorage.setItem('wt.sessions', JSON.stringify(sessions));
  localStorage.setItem('wt.exercises', JSON.stringify(EX.map(e => ({ name: e.name, groups: e.groups }))));
  localStorage.setItem('wt.exts', JSON.stringify(exTs));
  localStorage.setItem('wt.tombs', JSON.stringify(tombs));
  localStorage.setItem('wt.sync', JSON.stringify(sync));
  localStorage.setItem('wt.today', JSON.stringify(draft));
  localStorage.setItem('wt.step', JSON.stringify(weightStep));
  localStorage.setItem('wt.rest', JSON.stringify(restSec));
}

// ── rest timer ───────────────────────────────────────────
let restTimer = null, restNotified = false, audioCtx = null;
function primeAudio() { // must be called from a user gesture so the beep is allowed later
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}
function beep() {
  try {
    if (!audioCtx) return;
    [0, .3, .6].forEach(t => {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.frequency.value = 880;
      g.gain.setValueAtTime(.22, audioCtx.currentTime + t);
      g.gain.exponentialRampToValueAtTime(.001, audioCtx.currentTime + t + .22);
      o.start(audioCtx.currentTime + t); o.stop(audioCtx.currentTime + t + .25);
    });
  } catch (e) {}
}
const fmtT = ms => { const s = Math.max(0, Math.ceil(ms / 1000)); return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); };
function startRestTicker() {
  if (restTimer) return;
  restTimer = setInterval(() => {
    if (!draft.restUntil) { clearInterval(restTimer); restTimer = null; return; }
    const left = draft.restUntil - Date.now();
    if (left <= 0 && !restNotified) {
      restNotified = true;
      try { if (navigator.vibrate) navigator.vibrate([250, 120, 250]); } catch (e) {}
      beep();
    }
    if (left <= -60000) { // auto-dismiss the "go" banner after a minute
      draft.restUntil = null; restNotified = false; persist();
      clearInterval(restTimer); restTimer = null;
    }
    if (ui.view === 'workout') render();
  }, 500);
}

// ── helpers ──────────────────────────────────────────────
const esc = s => String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
const fmtVol = v => v >= 10000 ? (v / 1000).toFixed(1) + 'k' : v.toLocaleString('en-US');
const fmtDate = t => { const d = new Date(t); return d.toLocaleDateString('en-US', { weekday: 'short' }) + ' · ' + d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }); };
const fmtShort = t => new Date(t).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
const vol = sets => sets.reduce((a, s) => a + s.kg * s.reps, 0);
const exOf = name => EX.find(e => e.name === name);

function lastSetsFor(name) {
  for (let i = sessions.length - 1; i >= 0; i--) {
    const hits = sessions[i].sets.filter(s => s.ex === name);
    if (hits.length) return { sets: hits, date: sessions[i].date };
  }
  return null;
}
function defaultsFor(name) {
  const last = lastSetsFor(name);
  return { kg: last ? last.sets[0].kg : 20, reps: last ? last.sets[0].reps : 10 };
}
function currentKgReps() {
  const d = defaultsFor(EX[draft.exIdx].name);
  return { kg: draft.kg ?? d.kg, reps: draft.reps ?? d.reps };
}
function sessionGroups(sess) {
  const gs = [];
  sess.sets.forEach(s => (exOf(s.ex)?.groups || []).forEach(g => { if (!gs.includes(g)) gs.push(g); }));
  return gs.join(' · ') || '—';
}
function switchEx(idx) {
  idx = Math.max(0, Math.min(EX.length - 1, idx));
  const t = draft.sets.filter(s => s.ex === EX[idx].name);
  const lastToday = t[t.length - 1];
  const d = defaultsFor(EX[idx].name);
  draft.exIdx = idx;
  draft.kg = lastToday ? lastToday.kg : d.kg;
  draft.reps = lastToday ? lastToday.reps : d.reps;
}

// ── sync (end-to-end encrypted) ──────────────────────────
// The sync key never leaves the device. Storage id, auth token, and the
// AES key are independent one-way derivations of it, so the server sees
// only ciphertext under an unlinkable id.
const hexOf = b => [...b].map(x => x.toString(16).padStart(2, '0')).join('');
function b64Of(b) { let s = ''; for (let i = 0; i < b.length; i += 0x8000) s += String.fromCharCode.apply(null, b.subarray(i, i + 0x8000)); return btoa(s); }
const unb64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
async function skd(label) { return new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode('wt-sync:' + label + ':' + sync.key))); }
async function syncCtx() {
  return {
    id: hexOf(await skd('id')),
    auth: hexOf(await skd('auth')),
    aes: await crypto.subtle.importKey('raw', await skd('enc'), 'AES-GCM', false, ['encrypt', 'decrypt'])
  };
}
async function encPayload(obj, aes) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = new Uint8Array(await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, aes, new TextEncoder().encode(JSON.stringify(obj))));
  return b64Of(iv) + '.' + b64Of(ct);
}
async function decPayload(s, aes) {
  const [i, c] = s.split('.');
  const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: unb64(i) }, aes, unb64(c));
  return JSON.parse(new TextDecoder().decode(pt));
}
function newSyncKey() {
  const AL = 'ABCDEFGHJKMNPQRSTVWXYZ23456789'; // no easily-confused chars
  const b = crypto.getRandomValues(new Uint8Array(32));
  let k = '';
  for (let i = 0; i < 32; i++) { k += AL[b[i] % AL.length]; if (i % 4 === 3 && i < 31) k += '-'; }
  return k;
}
function mergeRemote(remote) {
  tombs = [...new Set([...tombs, ...(Array.isArray(remote.tombstones) ? remote.tombstones : [])])].slice(-1000);
  const map = new Map();
  sessions.forEach(s => map.set(s.id, s));
  withIds(Array.isArray(remote.sessions) ? remote.sessions : []).forEach(s => {
    const cur = map.get(s.id);
    if (!cur || (s.mt || 0) > (cur.mt || 0)) map.set(s.id, s);
  });
  sessions = [...map.values()].filter(s => !tombs.includes(s.id)).sort((a, b) => a.date - b.date);
  if ((remote.exTs || 0) > exTs && Array.isArray(remote.exercises)) {
    const im = normEx(remote.exercises);
    if (im.length) { EX = im; exTs = remote.exTs; if (draft.exIdx >= EX.length) draft.exIdx = 0; }
  }
}
async function doSync(showErrors) {
  if (!sync.url || !sync.key || ui.syncBusy) return;
  ui.syncBusy = true;
  let pulled = false;
  try {
    const ctx = await syncCtx();
    const base = sync.url.replace(/\/+$/, '');
    const r = await fetch(base + '/v1/blob/' + ctx.id, { headers: { 'X-Sync-Auth': ctx.auth } });
    if (r.status === 200) { mergeRemote(await decPayload(await r.text(), ctx.aes)); pulled = true; }
    else if (r.status !== 404) throw new Error('server replied ' + r.status);
    const payload = await encPayload({ v: 1, sessions, exercises: EX.map(e => ({ name: e.name, groups: e.groups })), tombstones: tombs, exTs }, ctx.aes);
    const w = await fetch(base + '/v1/blob/' + ctx.id, { method: 'PUT', headers: { 'X-Sync-Auth': ctx.auth, 'Content-Type': 'text/plain' }, body: payload });
    if (!w.ok) throw new Error('upload failed (' + w.status + ')');
    sync.last = Date.now();
    persist(); render();
    return pulled ? 'pulled' : 'fresh';
  } catch (e) {
    if (showErrors) alert('Sync failed: ' + e.message + '\nCheck the server URL, your connection, and that the key matches.');
    return 'error';
  } finally { ui.syncBusy = false; if (ui.view === 'sync') render(); }
}
const syncSoon = (() => { let t; return () => { if (!sync.url || !sync.key) return; clearTimeout(t); t = setTimeout(() => doSync(false), 1500); }; })();

// ── actions ──────────────────────────────────────────────
const A = {
  go(v) { ui.view = v; render(); },
  setPeriod(p) { ui.period = p; render(); },
  openLog(i) { ui.logIdx = i; ui.view = 'log'; render(); },
  selectGroup(g) { ui.groupSel = g; render(); },
  startWorkout() {
    if (draft.sets.length) { switchEx(draft.exIdx); persist(); ui.view = 'workout'; } // resume where you were
    else ui.view = 'pick';
    render();
  },
  openPicker() { ui.view = 'pick'; render(); },
  pickGroup(g) { ui.pickGroup = g; render(); },
  pickEx(i) { switchEx(i); persist(); ui.view = 'workout'; render(); },
  kgType(v) {
    const n = parseFloat(String(v).replace(',', '.'));
    const c = currentKgReps();
    draft.kg = isFinite(n) && n >= 0 ? Math.round(n * 100) / 100 : c.kg;
    draft.reps = c.reps;
    persist(); render();
  },
  setStep(s) { weightStep = s; persist(); render(); },
  kgStep(d) { const c = currentKgReps(); draft.kg = Math.max(0, Math.round((c.kg + d * weightStep) * 100) / 100); draft.reps = c.reps; persist(); render(); },
  repsStep(d) { const c = currentKgReps(); draft.reps = Math.max(1, c.reps + d); draft.kg = c.kg; persist(); render(); },
  copySet(kg, reps) { draft.kg = kg; draft.reps = reps; persist(); render(); },
  logSet() {
    const c = currentKgReps();
    draft.sets.push({ ex: EX[draft.exIdx].name, kg: c.kg, reps: c.reps });
    if (!draft.startedAt) draft.startedAt = Date.now();
    if (restSec > 0) {
      primeAudio();
      draft.restUntil = Date.now() + restSec * 1000;
      restNotified = false;
      startRestTicker();
    }
    persist(); render();
  },
  skipRest() { draft.restUntil = null; restNotified = false; persist(); render(); },
  restStep(d) { restSec = Math.max(0, Math.min(600, restSec + d * 15)); persist(); render(); },
  removeSet(i) {
    const name = EX[draft.exIdx].name;
    let seen = -1;
    for (let j = 0; j < draft.sets.length; j++) {
      if (draft.sets[j].ex === name) { seen++; if (seen === i) { draft.sets.splice(j, 1); break; } }
    }
    persist(); render();
  },
  prevEx() { switchEx(draft.exIdx - 1); persist(); render(); },
  nextEx() { if (draft.exIdx >= EX.length - 1) return; switchEx(draft.exIdx + 1); persist(); render(); },
  finish() {
    if (draft.sets.length) {
      const now = Date.now();
      sessions.push({ id: now + '-' + Math.random().toString(36).slice(2, 8), date: draft.startedAt || now, mt: now, sets: draft.sets });
      draft = { sets: [], exIdx: 0, kg: null, reps: null, startedAt: null, restUntil: null };
      persist(); syncSoon();
    }
    ui.view = 'home'; render();
  },
  discard() {
    if (draft.sets.length && !confirm('Discard this workout? ' + draft.sets.length + ' logged set(s) will be lost.')) return;
    draft = { sets: [], exIdx: 0, kg: null, reps: null, startedAt: null, restUntil: null };
    persist(); ui.view = 'home'; render();
  },
  openExercises() { ui.view = 'exercises'; render(); },
  openExEdit(i) {
    ui.editing = (i == null || i < 0)
      ? { idx: -1, nameDraft: '', groups: [GROUPS[0]] }
      : { idx: i, nameDraft: EX[i].name, groups: EX[i].groups.slice() };
    ui.view = 'exedit'; render();
    const inp = document.getElementById('exName');
    if (inp && ui.editing.idx < 0) inp.focus();
  },
  toggleGroup(g) {
    const ed = ui.editing;
    ed.nameDraft = document.getElementById('exName').value;
    if (ed.groups.includes(g)) {
      if (ed.groups.length > 1) ed.groups = ed.groups.filter(x => x !== g);
    } else {
      if (ed.groups.length >= 2) ed.groups.shift();
      ed.groups.push(g);
    }
    render();
  },
  saveExercise() {
    const ed = ui.editing;
    const name = document.getElementById('exName').value.trim();
    if (!name) { alert('Give the exercise a name.'); return; }
    if (EX.some((e, j) => j !== ed.idx && e.name.toLowerCase() === name.toLowerCase())) { alert('An exercise with that name already exists.'); return; }
    const groups = GROUPS.filter(g => ed.groups.includes(g));
    if (ed.idx < 0) {
      EX.push({ name, groups, group: groups.join(' · ') });
    } else {
      const old = EX[ed.idx].name;
      EX[ed.idx] = { name, groups, group: groups.join(' · ') };
      if (old !== name) {
        // rename follows through history so "last time" lookups keep working
        const now = Date.now();
        sessions.forEach(s => { if (s.sets.some(x => x.ex === old)) { s.sets.forEach(x => { if (x.ex === old) x.ex = name; }); s.mt = now; } });
        draft.sets.forEach(x => { if (x.ex === old) x.ex = name; });
      }
    }
    exTs = Date.now();
    ui.editing = null; persist(); syncSoon(); ui.view = 'exercises'; render();
  },
  deleteExercise() {
    const ed = ui.editing;
    if (EX.length <= 1) { alert('You need at least one exercise in the list.'); return; }
    const name = EX[ed.idx].name;
    const logged = sessions.reduce((a, s) => a + s.sets.filter(x => x.ex === name).length, 0);
    if (!confirm('Remove "' + name + '" from your exercise list?' + (logged ? ' Past workouts keep their ' + logged + ' logged set(s).' : ''))) return;
    EX.splice(ed.idx, 1);
    if (draft.exIdx >= EX.length) draft.exIdx = EX.length - 1;
    exTs = Date.now();
    ui.editing = null; persist(); syncSoon(); ui.view = 'exercises'; render();
  },
  exportData() {
    const blob = new Blob([JSON.stringify({ sessions, exercises: EX.map(e => ({ name: e.name, groups: e.groups })) }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'workout-data-' + new Date().toISOString().slice(0, 10) + '.json';
    a.click();
    URL.revokeObjectURL(a.href);
  },
  importData() { document.getElementById('importFile').click(); },
  deleteSession() {
    const s = sessions[ui.logIdx];
    if (!s) return;
    if (!confirm('Delete the workout from ' + fmtDate(s.date) + ' (' + s.sets.length + ' sets)? This cannot be undone.')) return;
    tombs = [...tombs, s.id].slice(-1000);
    sessions.splice(ui.logIdx, 1);
    ui.logIdx = null; persist(); syncSoon(); ui.view = 'history'; render();
  },
  deleteAllHistory() {
    if (!sessions.length) { alert('No history to delete.'); return; }
    if (!confirm('Delete ALL history (' + sessions.length + ' workouts)? Consider Export first — this cannot be undone.')) return;
    if (!confirm('Really delete everything? Last chance.')) return;
    tombs = [...tombs, ...sessions.map(s => s.id)].slice(-1000);
    sessions = [];
    persist(); syncSoon(); render();
  },
  readSyncUrl() {
    const u = (document.getElementById('syncUrl')?.value || sync.url).trim().replace(/\/+$/, '');
    if (u && !/^https?:\/\//.test(u)) { alert('The server URL must start with https:// (or http://localhost for testing).'); return null; }
    sync.url = u; return u;
  },
  createKey() {
    if (A.readSyncUrl() === null) return;
    if (!sync.url) { alert('Enter your sync server URL first.'); return; }
    sync.key = newSyncKey(); sync.last = 0;
    ui.showKey = true; persist(); render();
    doSync(true);
  },
  useKey() {
    if (A.readSyncUrl() === null) return;
    if (!sync.url) { alert('Enter your sync server URL first.'); return; }
    const k = (document.getElementById('syncKeyIn').value || '').toUpperCase().replace(/[^A-Z2-9]/g, '');
    if (k.length < 20) { alert('That does not look like a sync key.'); return; }
    sync.key = k.replace(/(.{4})(?=.)/g, '$1-'); sync.last = 0;
    ui.showKey = false; persist(); render();
    doSync(true).then(st => {
      if (st === 'fresh') alert('Connected — but the server had no existing data for this key. If you expected your history to appear, double-check the key for typos (Forget on this device, then re-enter it).');
    });
  },
  syncNow() {
    if (A.readSyncUrl() === null) return;
    persist(); render();
    doSync(true);
  },
  progMetric(m) { ui.progMetric = m; ui.progSel = null; render(); },
  progPick(i) { ui.progSel = ui.progSel === i ? null : i; render(); },
  toggleKey() { ui.showKey = !ui.showKey; render(); },
  copyKey() {
    const done = () => alert('Sync key copied. Store it somewhere safe — it is the only way to access your synced data.');
    if (navigator.clipboard?.writeText) navigator.clipboard.writeText(sync.key).then(done, () => prompt('Copy your sync key:', sync.key));
    else prompt('Copy your sync key:', sync.key);
  },
  forgetKey() {
    if (!confirm('Forget the sync key on this device? Your data stays here and on the server; reconnect any time with the same key.')) return;
    sync.key = ''; sync.last = 0; ui.showKey = false;
    persist(); render();
  }
};

document.getElementById('importFile').addEventListener('change', function () {
  const f = this.files[0]; this.value = '';
  if (!f) return;
  const rd = new FileReader();
  rd.onload = () => {
    let data;
    try { data = JSON.parse(rd.result); } catch (e) { alert('Not a valid JSON file.'); return; }
    const ok = data && Array.isArray(data.sessions) && data.sessions.every(s => s && typeof s.date === 'number' && Array.isArray(s.sets));
    if (!ok) { alert('Not a valid workout export file.'); return; }
    if (!confirm('Replace current data with ' + data.sessions.length + ' imported session(s)? Your current history will be overwritten.')) return;
    sessions = withIds(data.sessions);
    if (Array.isArray(data.exercises)) {
      const imported = normEx(data.exercises);
      if (imported.length) { EX = imported; exTs = Date.now(); draft.exIdx = 0; }
    }
    persist(); syncSoon(); render();
  };
  rd.readAsText(f);
});

// ── progress (last 6 months) ─────────────────────────────
const WEEK_MS = 7 * 864e5;
function weekStart(t) { const d = new Date(t); d.setHours(0, 0, 0, 0); d.setDate(d.getDate() - (d.getDay() + 6) % 7); return d.getTime(); }
function progressWeeks() {
  const N = 26;
  const start = weekStart(Date.now()) - (N - 1) * WEEK_MS;
  const weeks = Array.from({ length: N }, (_, i) => ({ t: start + i * WEEK_MS, vol: 0, sets: 0, workouts: 0 }));
  sessions.forEach(s => {
    const i = Math.round((weekStart(s.date) - start) / WEEK_MS);
    if (i < 0 || i >= N) return;
    weeks[i].workouts++; weeks[i].sets += s.sets.length; weeks[i].vol += vol(s.sets);
  });
  return weeks;
}
function rangeStats(from, to) {
  const ss = sessions.filter(s => s.date >= from && s.date < to);
  const sets = ss.flatMap(s => s.sets);
  return { workouts: ss.length, sets: sets.length, vol: vol(sets), heaviest: sets.reduce((a, s) => Math.max(a, s.kg), 0) };
}
function fmtDelta(cur, prev) {
  if (!prev) return cur ? 'new' : '—';
  const p = Math.round((cur - prev) / prev * 100);
  return (p > 0 ? '+' : p < 0 ? '−' : '±') + Math.abs(p) + '%';
}

function viewProgress() {
  if (!sessions.length) {
    return `
  <div class="hpad"><div class="h1">Progress</div><div class="sub" style="margin-top:4px">Last 6 months</div></div>
  <div class="card"><div class="sub" style="padding:8px 0">No workouts yet — your progress will appear here after your first session.</div></div>
  <div class="mtauto">${tabbar('progress')}</div>`;
  }
  const weeks = progressWeeks();
  const metric = ui.progMetric;
  const vals = weeks.map(w => w[metric]);
  const maxV = Math.max(...vals, 1);
  const fmtV = v => metric === 'vol' ? fmtVol(v) : String(v);
  const unit = metric === 'vol' ? ' kg' : '';
  // chart geometry: recessive grid, thin rounded bars, tap-to-inspect
  const CW = 352, CH = 168, TOP = 16, BOT = 24, PH = CH - TOP - BOT, slot = CW / weeks.length, bw = Math.min(9, slot - 4);
  let svg = '';
  [0, 0.5, 1].forEach(f => {
    const y = TOP + PH - f * PH;
    svg += `<line x1="0" y1="${y}" x2="${CW}" y2="${y}" stroke="#F0F0F4" stroke-width="1"/>`;
    if (f > 0) svg += `<text x="0" y="${y - 4}" font-size="9" font-weight="800" fill="#C0C2CC">${fmtV(Math.round(maxV * f))}</text>`;
  });
  let lastMonth = -1;
  weeks.forEach((w, i) => {
    const m = new Date(w.t).getMonth();
    if (m !== lastMonth) {
      lastMonth = m;
      if (i > 0) svg += `<text x="${i * slot + slot / 2}" y="${CH - 8}" font-size="9" font-weight="800" fill="#C0C2CC" text-anchor="middle">${new Date(w.t).toLocaleDateString('en-US', { month: 'short' }).toUpperCase()}</text>`;
    }
    const h = vals[i] / maxV * PH;
    const x = i * slot + (slot - bw) / 2, y = TOP + PH - h;
    if (vals[i] > 0) {
      const r = Math.min(4, bw / 2, h / 2);
      svg += `<path d="M${x} ${TOP + PH} v${-(h - r)} q0 ${-r} ${r} ${-r} h${bw - 2 * r} q${r} 0 ${r} ${r} v${h - r} z" fill="${ui.progSel === i ? '#4A3A85' : '#6F58B8'}"/>`;
    } else {
      svg += `<rect x="${x}" y="${TOP + PH - 2}" width="${bw}" height="2" rx="1" fill="#E4E4EC"/>`;
    }
    svg += `<rect x="${i * slot}" y="0" width="${slot}" height="${CH - BOT}" fill="transparent" onclick="A.progPick(${i})" style="cursor:pointer"/>`;
    if (ui.progSel === i && vals[i] > 0) {
      svg += `<text x="${Math.min(Math.max(x + bw / 2, 16), CW - 16)}" y="${Math.max(y - 5, 10)}" font-size="10" font-weight="800" fill="#16171C" text-anchor="middle">${fmtV(vals[i])}</text>`;
    }
  });
  const sel = ui.progSel;
  const caption = sel != null
    ? `Week of ${fmtShort(weeks[sel].t)} — ${fmtVol(weeks[sel].vol)} kg · ${weeks[sel].sets} sets · ${weeks[sel].workouts} workout${weeks[sel].workouts === 1 ? '' : 's'}`
    : 'Tap a bar for that week’s details';
  const segs = [['vol', 'Volume'], ['sets', 'Sets'], ['workouts', 'Workouts']].map(([m, l]) =>
    `<div class="segbtn ${metric === m ? 'segon' : ''}" onclick="A.progMetric('${m}')">${l}</div>`).join('');
  // last 13 weeks vs the 13 before
  const curFrom = weekStart(Date.now()) - 12 * WEEK_MS;
  const cur = rangeStats(curFrom, Infinity), prev = rangeStats(curFrom - 13 * WEEK_MS, curFrom);
  const dcap = (c, p) => `<span style="color:#16171C;font-weight:800">${fmtDelta(c, p)}</span> vs prior 3 mo`;
  return `
  <div class="hpad"><div class="h1">Progress</div><div class="sub" style="margin-top:4px">Last 6 months · weekly</div></div>
  <div class="seg">${segs}</div>
  <div class="card mt12" style="padding:16px 14px 12px">
    <svg viewBox="0 0 ${CW} ${CH}" width="100%" style="display:block;font-variant-numeric:tabular-nums">${svg}</svg>
    <div class="sub" style="margin-top:6px;font-variant-numeric:tabular-nums">${caption}</div>
  </div>
  <div class="grid2 mt12" style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <div class="card" style="padding:16px 14px"><div class="title" style="font-size:15px">Workouts</div><div class="big" style="margin-top:8px;font-size:24px">${cur.workouts}</div><div class="sub" style="margin-top:2px">${dcap(cur.workouts, prev.workouts)}</div></div>
    <div class="card" style="padding:16px 14px"><div class="title" style="font-size:15px">Volume</div><div class="big" style="margin-top:8px;font-size:24px">${fmtVol(cur.vol)} <small>kg</small></div><div class="sub" style="margin-top:2px">${dcap(cur.vol, prev.vol)}</div></div>
    <div class="card" style="padding:16px 14px"><div class="title" style="font-size:15px">Sets</div><div class="big" style="margin-top:8px;font-size:24px">${cur.sets}</div><div class="sub" style="margin-top:2px">${dcap(cur.sets, prev.sets)}</div></div>
    <div class="card" style="padding:16px 14px"><div class="title" style="font-size:15px">Heaviest</div><div class="big" style="margin-top:8px;font-size:24px">${cur.heaviest || '—'} <small>${cur.heaviest ? 'kg' : ''}</small></div><div class="sub" style="margin-top:2px">${dcap(cur.heaviest, prev.heaviest)}</div></div>
  </div>
  <div class="mtauto">${tabbar('progress')}</div>`;
}

function viewHome() {
  const isMonth = ui.period === 'month';
  const since = Date.now() - (isMonth ? 28 : 7) * 864e5;
  const ringMax = isMonth ? 80 : 20;
  const pSessions = sessions.filter(s => s.date >= since);
  const all = pSessions.flatMap(s => s.sets).concat(draft.sets);
  const workouts = pSessions.length + (draft.sets.length ? 1 : 0);
  const rings = GROUPS.map(g => {
    const n = all.filter(s => exOf(s.ex)?.groups.includes(g)).length;
    let lastSess = null;
    for (let i = sessions.length - 1; i >= 0; i--) {
      if (sessions[i].sets.some(s => exOf(s.ex)?.groups.includes(g))) { lastSess = sessions[i].date; break; }
    }
    const dash = Math.max(2, Math.min(1, n / ringMax) * 195).toFixed(0);
    return `<div class="tc"><div class="ringwrap"><svg class="ring" width="72" height="72" viewBox="0 0 72 72"><circle cx="36" cy="36" r="31" fill="none" stroke="#F0F0F4" stroke-width="7"/><circle cx="36" cy="36" r="31" fill="none" stroke="${GCOLORS[g]}" stroke-width="7" stroke-linecap="round" stroke-dasharray="${dash} 195"/></svg><div class="ringnum">${n}</div></div><div class="sub" style="margin-top:8px;font-weight:800;color:#16171C">${g}</div><div class="sub">${lastSess ? 'last ' + new Date(lastSess).toLocaleDateString('en-US', { weekday: 'short' }) : 'not yet'}</div></div>`;
  }).join('');
  const recent = sessions.slice(-3).reverse().map(s => {
    const i = sessions.indexOf(s);
    return `<div class="row" onclick="A.openLog(${i})" style="cursor:pointer"><div><div class="title" style="font-size:15px">${fmtDate(s.date)}</div><div class="sub">${sessionGroups(s)}</div></div><span class="chip">${s.sets.length} sets</span></div>`;

  return `

  <div class="seg"><div class="segbtn ${isMonth ? '' : 'segon'}" onclick="A.setPeriod('week')">Week</div><div class="segbtn ${isMonth ? 'segon' : ''}" onclick="A.setPeriod('month')">Month</div></div>
  <div class="grid3" style="margin-top:12px">
    <div class="card" style="padding:16px 12px"><div class="title" style="font-size:15px">Workouts</div><div class="big" style="margin-top:10px;font-size:26px">${workouts}</div><div class="sub" style="margin-top:2px">done</div></div>
    <div class="card" style="padding:16px 12px"><div class="title" style="font-size:15px">Sets</div><div class="big" style="margin-top:10px;font-size:26px">${all.length}</div><div class="sub" style="margin-top:2px">logged</div></div>
    <div class="card" style="padding:16px 12px"><div class="title" style="font-size:15px">Volume</div><div class="big" style="margin-top:10px;font-size:26px">${fmtVol(vol(all))} <small>kg</small></div><div class="sub" style="margin-top:2px">moved</div></div>

  <div class="hpad fx jb"><div class="h1">History</div><span class="fx" style="gap:16px"><span class="linkbtn grey" onclick="A.importData()">Import</span><span class="linkbtn" onclick="A.exportData()">Export</span></span></div>
  <div class="card scroll">${rows}</div>
  ${sessions.length ? '<div class="tc" style="padding-top:14px"><span class="linkbtn grey" onclick="A.deleteAllHistory()">Delete all history</span></div>' : ''}
  <div class="mtauto">${tabbar('history')}</div>`;
}

function viewLog() {
  const s = sessions[ui.logIdx];
  if (!s) { ui.view = 'history'; return viewHistory(); }
  const byEx = [];
  const seen = {};
  s.sets.forEach(x => {
    if (!seen[x.ex]) { seen[x.ex] = { name: x.ex, group: exOf(x.ex)?.group || '', sets: [] }; byEx.push(seen[x.ex]); }
    seen[x.ex].sets.push(x);
  });
  const cards = byEx.map(e => `<div class="card"><div class="fx jb"><span class="title" style="font-size:15px">${esc(e.name)}</span><span class="sub">${esc(e.group)}</span></div>` +
    e.sets.map((x, i) => `<div class="row"><span class="big" style="font-size:19px">${x.kg} <small>kg</small></span><span class="fx g12"><span class="sub" style="color:#16171C">× ${x.reps}</span><span class="setno">set ${i + 1}</span></span></div>`).join('') + '</div>').join('');
  return `
  <div class="fx jb" style="padding:0 6px"><span class="linkbtn" onclick="A.go('history')">‹ History</span><span class="linkbtn danger" onclick="A.deleteSession()">Delete</span></div>
  <div class="hpad" style="padding-top:14px"><div class="h1">${fmtDate(s.date)}</div><div class="sub" style="margin-top:4px">${sessionGroups(s)} · ${s.sets.length} sets · ${fmtVol(vol(s.sets))} kg</div></div>
  <div class="col g12 scroll">${cards}</div>`;
}

function viewGroups() {
  const tabs = GROUPS.map(g => `<div class="segbtn ${g === ui.groupSel ? 'segon' : ''}" onclick="A.selectGroup('${g}')">${g}</div>`).join('');
  const cards = [];
  EX.forEach(e => {
    if (!e.groups.includes(ui.groupSel)) return;
    const entries = [];
    for (let i = sessions.length - 1; i >= 0 && entries.length < 4; i--) {
      const hits = sessions[i].sets.filter(s => s.ex === e.name);
      if (hits.length) entries.push(`<div class="row"><span class="sub" style="color:#16171C;font-weight:800">${fmtShort(sessions[i].date)}</span><span class="sub" style="font-variant-numeric:tabular-nums">${hits.map(s => s.kg + '×' + s.reps).join(' · ')} kg</span></div>`);
    }
    if (entries.length) cards.push(`<div class="card"><div class="title" style="font-size:15px">${esc(e.name)}</div>${entries.join('')}</div>`);
  });
  const body = cards.length ? cards.join('') : '<div class="card"><div class="sub" style="padding:4px 0">No sets for this group yet.</div></div>';
  return `
  <div class="hpad fx jb"><div class="h1">By group</div><span class="linkbtn" onclick="A.openExercises()">Edit exercises</span></div>
  <div class="seg">${tabs}</div>
  <div class="col g12 scroll" style="margin-top:12px">${body}</div>
  <div class="mtauto">${tabbar('groups')}</div>`;
}

function viewExercises() {
  const rows = EX.map((e, i) =>
    `<div class="row" onclick="A.openExEdit(${i})" style="cursor:pointer"><div><div class="title" style="font-size:15px">${esc(e.name)}</div><div class="sub">${esc(e.group)}</div></div><span class="sub" style="font-weight:800">›</span></div>`).join('');
  return `
  <div class="fx jb" style="padding:0 6px"><span class="linkbtn" onclick="A.go('groups')">‹ Groups</span></div>
  <div class="hpad" style="padding-top:14px"><div class="h1">Exercises</div><div class="sub" style="margin-top:4px">Tap one to edit · order is workout order</div></div>
  <div class="card scroll">${rows}</div>
  <div class="mtauto"><div class="pill" onclick="A.openExEdit(-1)">Add exercise</div></div>`;
}

function viewExEdit() {
  const ed = ui.editing;
  if (!ed) { ui.view = 'exercises'; return viewExercises(); }
  const isNew = ed.idx < 0;
  const chips = GROUPS.map(g => `<span class="gtog ${ed.groups.includes(g) ? 'on' : ''}" onclick="A.toggleGroup('${g}')">${g}</span>`).join('');
  const del = isNew ? '' : `<div class="tc" style="margin-top:12px"><span class="linkbtn grey" onclick="A.deleteExercise()">Delete exercise</span></div>`;
  return `
  <div class="fx jb" style="padding:0 6px"><span class="linkbtn" onclick="A.openExercises()">‹ Exercises</span></div>
  <div class="hpad" style="padding-top:14px"><div class="h1">${isNew ? 'Add exercise' : 'Edit exercise'}</div></div>
  <div class="card"><div class="sethead">Name</div><input id="exName" class="txt" type="text" value="${esc(ed.nameDraft)}" placeholder="e.g. Bulgarian Split Squat" autocomplete="off"></div>
  <div class="card mt12"><div class="sethead">Muscle groups · pick 1–2</div><div class="fx" style="gap:8px;flex-wrap:wrap;padding-top:4px">${chips}</div></div>
  <div class="mtauto col g10"><div class="pill" onclick="A.saveExercise()">${isNew ? 'Add exercise' : 'Save changes'}</div>${del}</div>`;
}

function render() {
  const views = { home: viewHome, workout: viewWorkout, history: viewHistory, log: viewLog, groups: viewGroups, exercises: viewExercises, exedit: viewExEdit, sync: viewSync, progress: viewProgress, settings: viewSettings, pick: viewPick };
  document.getElementById('app').innerHTML = (views[ui.view] || viewHome)();
}
render();
if (sync.url && sync.key) doSync(false);
if (draft.restUntil) { restNotified = draft.restUntil <= Date.now(); startRestTicker(); }

if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
</body>
</html>
